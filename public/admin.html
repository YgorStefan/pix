<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CasePix · Admin</title>
  <style>
    :root {
      --bg: #020617; --bg-alt: #0f172a; --bg-card: #1e293b;
      --border: #334155; --border-dim: #1e293b;
      --text: #94a3b8; --text-bright: #f1f5f9; --text-dim: #475569;
      --green: #22c55e; --green-bg: #0a1f0f; --green-border: #166534;
      --red: #ef4444; --red-bg: #1c0a0a;
      --amber: #f59e0b;
      --blue: #60a5fa;
      --font: 'Fira Code', 'Courier New', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.5; }
    input, button { font-family: var(--font); font-size: 12px; }
    a { color: var(--text-dim); text-decoration: none; }
    a:hover { color: var(--text); }
    .hidden { display: none !important; }

    /* ── TOPBAR ── */
    #topbar { height: 52px; border-bottom: 1px solid var(--border-dim); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    .logo { color: var(--green); font-weight: 700; font-size: 14px; letter-spacing: 1px; }
    .logo-sub { color: var(--text-dim); font-size: 10px; letter-spacing: 2px; margin-left: 8px; }
    .btn-sair { background: transparent; border: 1px solid var(--border); color: var(--text-dim); border-radius: 3px; padding: 5px 12px; cursor: pointer; font-size: 11px; }
    .btn-sair:hover { border-color: var(--red); color: var(--red); }

    /* ── AUTH SCREEN ── */
    #tela-auth { min-height: calc(100vh - 53px); display: flex; align-items: center; justify-content: center; padding: 20px; }
    #card-auth { width: 100%; max-width: 340px; border: 1px solid var(--border-dim); border-radius: 6px; background: var(--bg-alt); padding: 20px; }
    .auth-title { font-size: 10px; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 16px; text-align: center; }
    .auth-form { display: flex; flex-direction: column; gap: 12px; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 9px; letter-spacing: 1px; color: var(--text-dim); }
    .field input { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 8px 10px; color: var(--text-bright); outline: none; width: 100%; }
    .field input:focus { border-color: var(--green); }
    .field input::placeholder { color: var(--text-dim); }
    .btn-auth { background: var(--green); color: var(--bg); border: none; border-radius: 3px; padding: 10px; cursor: pointer; font-weight: 700; font-size: 12px; margin-top: 4px; }
    .btn-auth:hover { opacity: 0.85; }
    .btn-auth:disabled { opacity: 0.4; cursor: default; }
    .auth-erro { background: var(--red-bg); border: 1px solid var(--red); color: var(--red); border-radius: 3px; padding: 8px 10px; font-size: 11px; display: none; }

    /* ── DASHBOARD ── */
    #painel { max-width: 1000px; margin: 0 auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; }
    .secao-label { font-size: 9px; letter-spacing: 2px; color: var(--text-dim); }
    #painel-topo { display: flex; justify-content: space-between; align-items: center; }
    #contador { color: var(--text-dim); font-size: 11px; }
    .btn-atualizar, .btn-nova-conta { background: transparent; border: 1px solid var(--border); color: var(--text-dim); border-radius: 3px; padding: 5px 12px; cursor: pointer; font-size: 11px; }
    .btn-atualizar:hover { border-color: var(--green); color: var(--green); }
    .btn-nova-conta { border-color: var(--green-border); color: var(--green); margin-right: 8px; }
    .btn-nova-conta:hover { opacity: 0.8; }
    #painel-topo-acoes { display: flex; }

    #card-nova-conta { display: none; border: 1px solid var(--green-border); border-radius: 6px; background: var(--bg-alt); padding: 16px; flex-direction: column; gap: 12px; }
    #card-nova-conta.aberta { display: flex; }
    .nova-conta-linha { display: flex; gap: 10px; flex-wrap: wrap; }
    .nova-conta-linha .field-inline { flex: 1; min-width: 140px; }
    .nova-conta-linha .field-inline input { width: 100%; border-color: var(--border); }
    .nova-conta-acoes { display: flex; gap: 8px; align-items: center; }
    .btn-criar-conta { background: var(--green); color: var(--bg); border: none; border-radius: 3px; padding: 7px 14px; cursor: pointer; font-weight: 700; font-size: 11px; }
    .btn-criar-conta:hover { opacity: 0.85; }
    .btn-cancelar-conta { background: transparent; border: 1px solid var(--border); color: var(--text-dim); border-radius: 3px; padding: 7px 14px; cursor: pointer; font-size: 11px; }
    .nova-conta-erro { background: var(--red-bg); border: 1px solid var(--red); color: var(--red); border-radius: 3px; padding: 8px 10px; font-size: 11px; display: none; }

    #tabela { display: flex; flex-direction: column; gap: 6px; }
    .conta-row { border: 1px solid var(--border-dim); border-radius: 6px; background: var(--bg-alt); overflow: hidden; }
    .conta-row-main { display: flex; align-items: center; gap: 14px; padding: 10px 14px; cursor: pointer; flex-wrap: wrap; }
    .conta-row-main:hover { background: var(--bg-card); }
    .conta-nome { color: var(--text-bright); font-size: 12px; font-weight: 700; min-width: 140px; }
    .conta-email { color: var(--text-dim); font-size: 11px; flex: 1; min-width: 160px; }
    .conta-saldo { color: var(--green); font-size: 12px; min-width: 90px; text-align: right; }
    .conta-toggle { color: var(--text-dim); font-size: 10px; width: 14px; text-align: center; }

    .conta-detalhe { display: none; border-top: 1px solid var(--border-dim); padding: 14px; flex-direction: column; gap: 14px; }
    .conta-detalhe.aberta { display: flex; }

    .editar-saldo-row { display: flex; gap: 8px; align-items: flex-end; }
    .field-inline { display: flex; flex-direction: column; gap: 4px; }
    .field-inline label { font-size: 9px; letter-spacing: 1px; color: var(--text-dim); }
    .field-inline input { background: var(--bg); border: 1px solid var(--green-border); border-radius: 3px; padding: 6px 8px; color: var(--text-bright); outline: none; width: 130px; }
    .btn-salvar-saldo { background: var(--green); color: var(--bg); border: none; border-radius: 3px; padding: 7px 14px; cursor: pointer; font-weight: 700; font-size: 11px; }
    .btn-salvar-saldo:hover { opacity: 0.85; }
    .btn-excluir { background: transparent; border: 1px solid var(--border); color: var(--text-dim); border-radius: 3px; padding: 7px 14px; cursor: pointer; font-size: 11px; margin-left: auto; }
    .btn-excluir:hover { border-color: var(--red); color: var(--red); }

    .historico-label { font-size: 9px; letter-spacing: 1.5px; color: var(--text-dim); }
    .saque-row-hist { background: var(--bg); border: 1px solid var(--border-dim); border-radius: 4px; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px; }
    .saque-status { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; min-width: 90px; }
    .status-ok { color: var(--green); }
    .status-agendado { color: var(--amber); }
    .status-erro { color: var(--red); }
    .saque-info { color: var(--text); font-size: 11px; flex: 1; padding: 0 12px; }
    .saque-meta { color: var(--text-dim); font-size: 10px; text-align: right; }
    .empty-hist, .empty-lista { color: var(--text-dim); font-size: 11px; padding: 8px 0; text-align: center; }

    #terminal-output { background: var(--bg); border: 1px solid var(--border-dim); border-radius: 6px; padding: 12px; font-size: 11px; line-height: 1.7; display: none; }
    .terminal-line { display: flex; gap: 8px; }
    .terminal-prompt { color: var(--text-dim); flex-shrink: 0; }
    .terminal-method { color: var(--blue); }
    .terminal-path { color: var(--text); }
    .terminal-status-ok { color: var(--green); }
    .terminal-status-err { color: var(--red); }
    .terminal-json { color: var(--text); white-space: pre-wrap; word-break: break-all; padding-left: 20px; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
  <div id="topbar">
    <span><span class="logo">▶ CASEPIX</span><span class="logo-sub">CURADORIA</span></span>
    <button class="btn-sair hidden" id="btn-sair" onclick="sair()">sair</button>
  </div>

  <div id="tela-auth">
    <div id="card-auth">
      <div class="auth-title">ACESSO RESTRITO · ADMINISTRAÇÃO</div>
      <div class="auth-erro" id="auth-erro"></div>
      <form class="auth-form" onsubmit="return submitLogin(event)">
        <div class="field">
          <label>E-MAIL</label>
          <input id="login-email" type="email" placeholder="admin@casepix.com" required autocomplete="username">
        </div>
        <div class="field">
          <label>SENHA</label>
          <input id="login-senha" type="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button class="btn-auth" type="submit" id="btn-login">ENTRAR</button>
      </form>
    </div>
  </div>

  <main id="painel" class="hidden">
    <div id="painel-topo">
      <div>
        <div class="secao-label">CONTAS CADASTRADAS</div>
        <div id="contador"></div>
      </div>
      <div id="painel-topo-acoes">
        <button class="btn-nova-conta" onclick="toggleNovaConta()">+ Nova conta</button>
        <button class="btn-atualizar" onclick="carregarContas()">↻ Atualizar</button>
      </div>
    </div>

    <div id="card-nova-conta">
      <div class="secao-label">CRIAR NOVA CONTA</div>
      <div class="nova-conta-erro" id="nova-conta-erro"></div>
      <form onsubmit="return submitNovaConta(event)">
        <div class="nova-conta-linha">
          <div class="field-inline">
            <label>NOME</label>
            <input id="nova-conta-nome" type="text" placeholder="Nome completo" required>
          </div>
          <div class="field-inline">
            <label>E-MAIL</label>
            <input id="nova-conta-email" type="email" placeholder="email@exemplo.com" required>
          </div>
        </div>
        <div class="nova-conta-linha">
          <div class="field-inline">
            <label>SENHA</label>
            <input id="nova-conta-senha" type="password" placeholder="mínimo 6 caracteres" required minlength="6">
          </div>
          <div class="field-inline">
            <label>SALDO INICIAL (R$)</label>
            <input id="nova-conta-saldo" type="text" placeholder="0.00">
          </div>
        </div>
        <div class="nova-conta-acoes">
          <button class="btn-criar-conta" type="submit" id="btn-criar-conta">Criar conta</button>
          <button class="btn-cancelar-conta" type="button" onclick="toggleNovaConta(false)">Cancelar</button>
        </div>
      </form>
    </div>

    <div id="tabela"></div>
    <div id="terminal-output"></div>
  </main>

<script>
  const TOKEN_KEY = 'casepix_admin_token';
  let contas = [];
  let abertaId = null;

  function token() { return localStorage.getItem(TOKEN_KEY); }
  function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
  function limparToken() { localStorage.removeItem(TOKEN_KEY); }

  async function api(method, path, body) {
    const headers = { 'Content-Type': 'application/json' };
    const t = token();
    if (t) headers['Authorization'] = `Bearer ${t}`;
    const opts = { method, headers };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch(path, opts);
    let data = null;
    const ct = res.headers.get('content-type') || '';
    if (ct.includes('application/json') && res.status !== 204) {
      data = await res.json();
    }
    return { status: res.status, data };
  }

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function mostrarErroAuth(msg) {
    const el = document.getElementById('auth-erro');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function submitLogin(ev) {
    ev.preventDefault();
    document.getElementById('auth-erro').style.display = 'none';
    const email = document.getElementById('login-email').value.trim();
    const senha = document.getElementById('login-senha').value;
    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    try {
      const { status, data } = await api('POST', '/admin/login', { email, password: senha });
      if (status === 200) {
        setToken(data.token);
        await entrarNoPainel();
      } else {
        mostrarErroAuth(data?.message || data?.erros?.join('\n') || 'Não foi possível entrar.');
      }
    } finally {
      btn.disabled = false;
    }
    return false;
  }

  function sair() {
    limparToken();
    document.getElementById('painel').classList.add('hidden');
    document.getElementById('btn-sair').classList.add('hidden');
    document.getElementById('tela-auth').classList.remove('hidden');
    document.getElementById('login-senha').value = '';
  }

  async function entrarNoPainel() {
    const { status } = await api('GET', '/admin/accounts');
    if (status !== 200) {
      limparToken();
      return;
    }
    document.getElementById('tela-auth').classList.add('hidden');
    document.getElementById('btn-sair').classList.remove('hidden');
    document.getElementById('painel').classList.remove('hidden');
    await carregarContas();
  }

  function toggleNovaConta(forcar) {
    const card = document.getElementById('card-nova-conta');
    const abrir = forcar !== undefined ? forcar : !card.classList.contains('aberta');
    card.classList.toggle('aberta', abrir);
    document.getElementById('nova-conta-erro').style.display = 'none';
    if (abrir) {
      document.getElementById('nova-conta-nome').focus();
    } else {
      document.getElementById('nova-conta-nome').value = '';
      document.getElementById('nova-conta-email').value = '';
      document.getElementById('nova-conta-senha').value = '';
      document.getElementById('nova-conta-saldo').value = '';
    }
  }

  function mostrarErroNovaConta(msg) {
    const el = document.getElementById('nova-conta-erro');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function submitNovaConta(ev) {
    ev.preventDefault();
    document.getElementById('nova-conta-erro').style.display = 'none';
    const body = {
      name: document.getElementById('nova-conta-nome').value.trim(),
      email: document.getElementById('nova-conta-email').value.trim(),
      password: document.getElementById('nova-conta-senha').value,
      balance: document.getElementById('nova-conta-saldo').value.trim() || '0',
    };
    const btn = document.getElementById('btn-criar-conta');
    btn.disabled = true;
    try {
      const { status, data } = await api('POST', '/admin/accounts', body);
      if (status === 201) {
        toggleNovaConta(false);
        await carregarContas();
      } else {
        mostrarErroNovaConta(data?.message || data?.erros?.join('\n') || 'Não foi possível criar a conta.');
      }
    } finally {
      btn.disabled = false;
    }
    return false;
  }

  async function carregarContas() {
    const { status, data } = await api('GET', '/admin/accounts');
    if (status !== 200) return;
    contas = data;
    document.getElementById('contador').textContent = `${contas.length} conta(s)`;
    renderizarTabela();
  }

  function renderizarTabela() {
    const tabela = document.getElementById('tabela');
    if (contas.length === 0) {
      tabela.innerHTML = '<div class="empty-lista">Nenhuma conta cadastrada.</div>';
      return;
    }
    tabela.innerHTML = contas.map(c => `
      <div class="conta-row" id="row-${c.id}">
        <div class="conta-row-main" onclick="toggleDetalhe('${c.id}')">
          <span class="conta-toggle">${abertaId === c.id ? '▾' : '▸'}</span>
          <span class="conta-nome">${esc(c.name)}</span>
          <span class="conta-email">${esc(c.email)}</span>
          <span class="conta-saldo">R$ ${c.balance}</span>
        </div>
        <div class="conta-detalhe${abertaId === c.id ? ' aberta' : ''}" id="detalhe-${c.id}">
          <div class="editar-saldo-row">
            <div class="field-inline">
              <label>NOVO SALDO (R$)</label>
              <input id="saldo-${c.id}" type="text" value="${esc(c.balance)}">
            </div>
            <button class="btn-salvar-saldo" onclick="salvarSaldo('${c.id}')">Salvar saldo</button>
            <button class="btn-excluir" onclick="confirmarExcluir('${c.id}')">Excluir conta</button>
          </div>
          <div>
            <div class="historico-label">HISTÓRICO DE SAQUES</div>
            <div id="historico-${c.id}" style="margin-top:8px">Carregando...</div>
          </div>
        </div>
      </div>
    `).join('');
    if (abertaId && contas.some(c => c.id === abertaId)) {
      carregarHistorico(abertaId);
    }
  }

  async function toggleDetalhe(id) {
    abertaId = abertaId === id ? null : id;
    renderizarTabela();
  }

  async function carregarHistorico(id) {
    const el = document.getElementById(`historico-${id}`);
    const { status, data } = await api('GET', `/admin/accounts/${id}/withdrawals`);
    if (status !== 200 || !Array.isArray(data) || data.length === 0) {
      el.innerHTML = '<div class="empty-hist">Nenhum saque registrado.</div>';
      return;
    }
    el.innerHTML = data.map(s => {
      let statusHtml, meta;
      if (s.error)      { statusHtml = '<span class="saque-status status-erro">✗ ERRO</span>';      meta = s.error_reason || ''; }
      else if (!s.done) { statusHtml = '<span class="saque-status status-agendado">⏳ AGENDADO</span>'; meta = s.scheduled_for || ''; }
      else              { statusHtml = '<span class="saque-status status-ok">✓ CONCLUÍDO</span>';    meta = s.created_at || ''; }
      const pix = s.pix ? `${s.pix.type}: ${s.pix.key}` : '';
      return `
        <div class="saque-row-hist">
          ${statusHtml}
          <div class="saque-info">R$ ${s.amount} → ${esc(pix)}</div>
          <div class="saque-meta">${esc(meta)}</div>
        </div>
      `;
    }).join('');
  }

  function mostrarTerminal(method, path, status, data) {
    const el = document.getElementById('terminal-output');
    el.style.display = 'block';
    const statusClass = status >= 200 && status < 300 ? 'terminal-status-ok' : 'terminal-status-err';
    el.innerHTML = `
      <div class="terminal-line">
        <span class="terminal-prompt">▶</span>
        <span class="terminal-method">${esc(method)}</span>
        <span class="terminal-path">${esc(path)}</span>
      </div>
      <div class="terminal-line">
        <span class="terminal-prompt">◀</span>
        <span class="${statusClass}">${status}</span>
      </div>
      ${data !== null ? `<div class="terminal-json">${JSON.stringify(data, null, 2)}</div>` : ''}
    `;
  }

  async function salvarSaldo(id) {
    const novoSaldo = document.getElementById(`saldo-${id}`).value.trim();
    const path = `/admin/accounts/${id}/balance`;
    const { status, data } = await api('PATCH', path, { balance: novoSaldo });
    mostrarTerminal('PATCH', path, status, data);
    if (status === 200) {
      await carregarContas();
    }
  }

  async function confirmarExcluir(id) {
    const conta = contas.find(c => c.id === id);
    const nome = conta ? conta.name : id;
    if (!confirm(`Excluir a conta "${nome}"? Esta ação não pode ser desfeita.`)) return;
    const path = `/admin/accounts/${id}`;
    const { status, data } = await api('DELETE', path);
    if (status === 204) {
      abertaId = null;
      await carregarContas();
    } else {
      mostrarTerminal('DELETE', path, status, data);
    }
  }

  (async function iniciar() {
    if (token()) await entrarNoPainel();
  })();
</script>
</body>
</html>
