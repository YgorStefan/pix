<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CasePix</title>
  <style>
    :root {
      --bg: #020617; --bg-alt: #0f172a; --bg-card: #1e293b;
      --border: #334155; --border-dim: #1e293b;
      --text: #94a3b8; --text-bright: #f1f5f9; --text-dim: #475569;
      --green: #22c55e; --green-bg: #0a1f0f; --green-border: #166534;
      --red: #ef4444; --red-bg: #1c0a0a;
      --amber: #f59e0b; --amber-bg: #1c1203;
      --blue: #60a5fa;
      --font: 'Fira Code', 'Courier New', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; line-height: 1.5; }
    input, button, select { font-family: var(--font); font-size: 12px; }
    a { color: var(--text-dim); text-decoration: none; }
    a:hover { color: var(--text); }
    .hidden { display: none !important; }

    /* ── TOPBAR ── */
    #topbar { height: 52px; border-bottom: 1px solid var(--border-dim); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
    .logo { color: var(--green); font-weight: 700; font-size: 14px; letter-spacing: 1px; }
    #topbar-conta { display: flex; align-items: center; gap: 16px; }
    #topbar-nome { color: var(--text); font-size: 12px; }
    #topbar-nome strong { color: var(--text-bright); }
    .btn-sair { background: transparent; border: 1px solid var(--border); color: var(--text-dim); border-radius: 3px; padding: 5px 12px; cursor: pointer; font-size: 11px; }
    .btn-sair:hover { border-color: var(--red); color: var(--red); }

    /* ── AUTH SCREEN ── */
    #tela-auth { min-height: calc(100vh - 53px); display: flex; align-items: center; justify-content: center; padding: 20px; }
    #card-auth { width: 100%; max-width: 380px; border: 1px solid var(--border-dim); border-radius: 6px; background: var(--bg-alt); overflow: hidden; }
    .auth-tabs { display: flex; border-bottom: 1px solid var(--border-dim); }
    .auth-tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; color: var(--text-dim); font-size: 11px; letter-spacing: 1.5px; border-bottom: 2px solid transparent; }
    .auth-tab.ativa { color: var(--green); border-bottom-color: var(--green); }
    .auth-body { padding: 20px; }
    .auth-form { display: none; flex-direction: column; gap: 12px; }
    .auth-form.ativa { display: flex; }
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 9px; letter-spacing: 1px; color: var(--text-dim); }
    .field input, .field select { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 8px 10px; color: var(--text-bright); outline: none; width: 100%; }
    .field input:focus, .field select:focus { border-color: var(--green); }
    .field input::placeholder { color: var(--text-dim); }
    .field select option { background: var(--bg-alt); }
    .btn-auth { background: var(--green); color: var(--bg); border: none; border-radius: 3px; padding: 10px; cursor: pointer; font-weight: 700; font-size: 12px; margin-top: 4px; }
    .btn-auth:hover { opacity: 0.85; }
    .btn-auth:disabled { opacity: 0.4; cursor: default; }
    .auth-erro { background: var(--red-bg); border: 1px solid var(--red); color: var(--red); border-radius: 3px; padding: 8px 10px; font-size: 11px; display: none; }
    .auth-hint { text-align: center; color: var(--text-dim); font-size: 10px; margin-top: 10px; }
    .auth-hint a { color: var(--green); }

    /* ── MAIN ── */
    #painel-conta { max-width: 880px; margin: 0 auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 20px; }
    #conta-header { display: flex; justify-content: space-between; align-items: center; }
    .conta-header-info h2 { color: var(--text-bright); font-size: 18px; font-weight: 700; margin-bottom: 2px; }
    .conta-header-saldo { color: var(--green); font-size: 14px; }
    .conta-header-email { color: var(--text-dim); font-size: 11px; }

    .secao-label { font-size: 9px; letter-spacing: 2px; color: var(--text-dim); margin-bottom: 8px; }

    /* saque form */
    #form-saque { background: var(--bg-alt); border: 1px solid var(--border-dim); border-radius: 6px; padding: 14px; }
    .saque-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: flex-end; flex-wrap: wrap; }
    .saque-row:last-child { margin-bottom: 0; }
    .field-valor { width: 120px; }
    .field-tipo { width: 110px; }
    .field-chave { flex: 1; min-width: 160px; }
    .field-schedule { flex: 1; min-width: 160px; }
    .btn-sacar { background: var(--green); color: var(--bg); border: none; border-radius: 3px; padding: 8px 18px; cursor: pointer; font-weight: 700; font-size: 12px; white-space: nowrap; align-self: flex-end; }
    .btn-sacar:hover { opacity: 0.85; }
    .btn-sacar:disabled { opacity: 0.4; cursor: default; }
    .schedule-toggle { display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--text-dim); font-size: 11px; user-select: none; }
    .schedule-toggle input[type=checkbox] { accent-color: var(--green); width: 12px; height: 12px; }
    #schedule-row { display: none; }

    /* terminal */
    #terminal-output { background: var(--bg); border: 1px solid var(--border-dim); border-radius: 6px; padding: 12px; font-size: 11px; line-height: 1.7; display: none; }
    .terminal-line { display: flex; gap: 8px; }
    .terminal-prompt { color: var(--text-dim); flex-shrink: 0; }
    .terminal-method { color: var(--blue); }
    .terminal-path { color: var(--text); }
    .terminal-status-ok { color: var(--green); }
    .terminal-status-err { color: var(--red); }
    .terminal-json { color: var(--text); white-space: pre-wrap; word-break: break-all; padding-left: 20px; }
    .terminal-cursor { display: inline-block; width: 8px; height: 13px; background: var(--green); animation: blink 1s step-end infinite; vertical-align: middle; }
    @keyframes blink { 50% { opacity: 0; } }

    /* histórico */
    #historico { display: flex; flex-direction: column; gap: 4px; }
    .saque-row-hist { background: var(--bg-alt); border: 1px solid var(--border-dim); border-radius: 4px; padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px; }
    .saque-status { font-size: 10px; font-weight: 700; letter-spacing: 0.5px; min-width: 90px; }
    .status-ok { color: var(--green); }
    .status-agendado { color: var(--amber); }
    .status-erro { color: var(--red); }
    .saque-info { color: var(--text); font-size: 11px; flex: 1; padding: 0 12px; }
    .saque-meta { color: var(--text-dim); font-size: 10px; text-align: right; }
    .empty-hist { color: var(--text-dim); font-size: 11px; padding: 8px 0; }

    /* danger zone */
    #danger-zone { border-top: 1px solid var(--border-dim); padding-top: 14px; display: flex; justify-content: flex-end; }
    .btn-excluir-conta { background: transparent; border: none; color: var(--text-dim); cursor: pointer; font-size: 10px; text-decoration: underline; }
    .btn-excluir-conta:hover { color: var(--red); }

    /* scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
  <div id="topbar">
    <span class="logo">▶ CASEPIX</span>
    <div id="topbar-conta" class="hidden">
      <span id="topbar-nome"></span>
      <button class="btn-sair" onclick="sair()">sair</button>
    </div>
    <a id="topbar-link" href="https://ygorstefan.com" target="_blank">ygorstefan.com ↗</a>
  </div>

  <div id="tela-auth">
    <div id="card-auth">
      <div class="auth-tabs">
        <div class="auth-tab ativa" id="tab-login" onclick="mostrarAba('login')">ENTRAR</div>
        <div class="auth-tab" id="tab-registro" onclick="mostrarAba('registro')">CRIAR CONTA</div>
      </div>
      <div class="auth-body">
        <div class="auth-erro" id="auth-erro"></div>

        <form class="auth-form ativa" id="form-login" onsubmit="return submitLogin(event)">
          <div class="field">
            <label>E-MAIL</label>
            <input id="login-email" type="email" placeholder="voce@email.com" required autocomplete="username">
          </div>
          <div class="field">
            <label>SENHA</label>
            <input id="login-senha" type="password" placeholder="••••••••" required autocomplete="current-password">
          </div>
          <button class="btn-auth" type="submit" id="btn-login">ENTRAR</button>
        </form>

        <form class="auth-form" id="form-registro" onsubmit="return submitRegistro(event)">
          <div class="field">
            <label>NOME</label>
            <input id="reg-nome" type="text" placeholder="Seu nome" maxlength="60" required autocomplete="name">
          </div>
          <div class="field">
            <label>E-MAIL</label>
            <input id="reg-email" type="email" placeholder="voce@email.com" required autocomplete="username">
          </div>
          <div class="field">
            <label>SENHA (mín. 6 caracteres)</label>
            <input id="reg-senha" type="password" placeholder="••••••••" required minlength="6" autocomplete="new-password">
          </div>
          <div class="field">
            <label>SALDO INICIAL (opcional)</label>
            <input id="reg-saldo" type="text" placeholder="0.00">
          </div>
          <button class="btn-auth" type="submit" id="btn-registro">CRIAR CONTA</button>
        </form>

        <div class="auth-hint" id="auth-hint">Novo por aqui? <a href="#" onclick="mostrarAba('registro');return false;">Crie sua conta</a></div>
        <div class="auth-hint"><a href="/admin.html">Acesso administrativo ↗</a></div>
      </div>
    </div>
  </div>

  <main id="painel-conta" class="hidden">
    <div id="conta-header">
      <div class="conta-header-info">
        <h2 id="hdr-nome"></h2>
        <div class="conta-header-email" id="hdr-email"></div>
        <div class="conta-header-saldo">Saldo: R$ <span id="hdr-saldo"></span></div>
      </div>
    </div>

    <div>
      <div class="secao-label">NOVO SAQUE</div>
      <div id="form-saque">
        <div class="saque-row">
          <div class="field field-valor">
            <label>VALOR (R$)</label>
            <input id="inp-valor" type="text" placeholder="0.00">
          </div>
          <div class="field field-tipo">
            <label>TIPO PIX</label>
            <select id="sel-tipo" onchange="atualizarPlaceholderChave()">
              <option value="email">email</option>
              <option value="cpf">cpf</option>
              <option value="cnpj">cnpj</option>
              <option value="telefone">telefone</option>
              <option value="aleatoria">aleatória</option>
            </select>
          </div>
          <div class="field field-chave">
            <label>CHAVE PIX</label>
            <input id="inp-chave" type="text" placeholder="usuario@email.com" oninput="mascararChave()">
          </div>
          <button class="btn-sacar" onclick="executarSaque()">SACAR</button>
        </div>
        <div class="saque-row">
          <label class="schedule-toggle">
            <input type="checkbox" id="chk-schedule" onchange="toggleSchedule()">
            Agendar para data específica
          </label>
        </div>
        <div class="saque-row" id="schedule-row">
          <div class="field field-schedule">
            <label>DATA/HORA (America/Sao_Paulo)</label>
            <input id="inp-schedule" type="text" placeholder="YYYY-MM-DD HH:mm">
          </div>
        </div>
      </div>
    </div>

    <div id="terminal-output"></div>

    <div>
      <div class="secao-label">HISTÓRICO DE SAQUES</div>
      <div id="historico"></div>
    </div>

    <div id="danger-zone">
      <button class="btn-excluir-conta" onclick="confirmarExcluirConta()">Excluir minha conta</button>
    </div>
  </main>

<script>
  const TOKEN_KEY = 'casepix_token';
  const placeholders = {
    email:    'usuario@email.com',
    cpf:      '123.456.789-00',
    cnpj:     '12.345.678/0001-90',
    telefone: '+55 (11) 99999-9999',
    aleatoria:'xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx',
  };

  function token() { return localStorage.getItem(TOKEN_KEY); }
  function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
  function limparToken() { localStorage.removeItem(TOKEN_KEY); }

  async function api(method, path, body) {
    const headers = { 'Content-Type': 'application/json' };
    const t = token();
    if (t) headers['Authorization'] = `Bearer ${t}`;
    const opts = { method, headers };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch(path, opts);
    let data = null;
    const ct = res.headers.get('content-type') || '';
    if (ct.includes('application/json') && res.status !== 204) {
      data = await res.json();
    }
    return { status: res.status, data };
  }

  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── AUTENTICAÇÃO ── */

  function mostrarAba(aba) {
    document.getElementById('tab-login').classList.toggle('ativa', aba === 'login');
    document.getElementById('tab-registro').classList.toggle('ativa', aba === 'registro');
    document.getElementById('form-login').classList.toggle('ativa', aba === 'login');
    document.getElementById('form-registro').classList.toggle('ativa', aba === 'registro');
    document.getElementById('auth-hint').textContent = '';
    document.getElementById('auth-hint').innerHTML = aba === 'login'
      ? 'Novo por aqui? <a href="#" onclick="mostrarAba(\'registro\');return false;">Crie sua conta</a>'
      : 'Já tem conta? <a href="#" onclick="mostrarAba(\'login\');return false;">Entrar</a>';
    esconderErroAuth();
  }

  function mostrarErroAuth(msg) {
    const el = document.getElementById('auth-erro');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function esconderErroAuth() {
    document.getElementById('auth-erro').style.display = 'none';
  }

  async function submitLogin(ev) {
    ev.preventDefault();
    esconderErroAuth();
    const email = document.getElementById('login-email').value.trim();
    const senha = document.getElementById('login-senha').value;
    const btn = document.getElementById('btn-login');
    btn.disabled = true;
    try {
      const { status, data } = await api('POST', '/auth/login', { email, password: senha });
      if (status === 200) {
        setToken(data.token);
        await entrarNoPainel();
      } else {
        mostrarErroAuth(data?.message || data?.erros?.join('\n') || 'Não foi possível entrar.');
      }
    } finally {
      btn.disabled = false;
    }
    return false;
  }

  async function submitRegistro(ev) {
    ev.preventDefault();
    esconderErroAuth();
    const nome  = document.getElementById('reg-nome').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const senha = document.getElementById('reg-senha').value;
    const saldo = document.getElementById('reg-saldo').value.trim();
    const btn = document.getElementById('btn-registro');
    btn.disabled = true;
    try {
      const body = { name: nome, email, password: senha };
      if (saldo) body.balance = saldo;
      const { status, data } = await api('POST', '/auth/register', body);
      if (status === 201) {
        setToken(data.token);
        await entrarNoPainel();
      } else {
        mostrarErroAuth(data?.message || data?.erros?.join('\n') || 'Não foi possível criar a conta.');
      }
    } finally {
      btn.disabled = false;
    }
    return false;
  }

  function sair() {
    limparToken();
    document.getElementById('painel-conta').classList.add('hidden');
    document.getElementById('topbar-conta').classList.add('hidden');
    document.getElementById('topbar-link').classList.remove('hidden');
    document.getElementById('tela-auth').classList.remove('hidden');
    document.getElementById('login-senha').value = '';
    mostrarAba('login');
  }

  async function entrarNoPainel() {
    const { status, data } = await api('GET', '/account/me');
    if (status !== 200) {
      limparToken();
      return;
    }
    document.getElementById('tela-auth').classList.add('hidden');
    document.getElementById('topbar-link').classList.add('hidden');
    document.getElementById('topbar-conta').classList.remove('hidden');
    document.getElementById('painel-conta').classList.remove('hidden');
    document.getElementById('topbar-nome').innerHTML = `<strong>${esc(data.name)}</strong>`;
    document.getElementById('hdr-nome').textContent = data.name;
    document.getElementById('hdr-email').textContent = data.email;
    document.getElementById('hdr-saldo').textContent = data.balance;
    document.getElementById('terminal-output').style.display = 'none';
    await carregarHistorico();
  }

  /* ── PAINEL ── */

  function atualizarPlaceholderChave() {
    const tipo = document.getElementById('sel-tipo').value;
    const input = document.getElementById('inp-chave');
    input.placeholder = placeholders[tipo] || '';
    input.value = '';
  }

  function apenasDigitos(v) { return v.replace(/\D/g, ''); }

  function mascararCpf(v) {
    v = apenasDigitos(v).slice(0, 11);
    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
    return v;
  }

  function mascararCnpj(v) {
    v = apenasDigitos(v).slice(0, 14);
    v = v.replace(/(\d{2})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d)/, '$1.$2');
    v = v.replace(/(\d{3})(\d)/, '$1/$2');
    v = v.replace(/(\d{4})(\d{1,2})$/, '$1-$2');
    return v;
  }

  function mascararTelefone(v) {
    let d = apenasDigitos(v);
    if (d.length > 11 && d.startsWith('55')) d = d.slice(2);
    d = d.slice(0, 11);
    if (d.length === 0) return '+55';
    let out = '+55 (' + d.slice(0, 2);
    if (d.length >= 2) out += ')';
    if (d.length > 2) {
      const resto = d.slice(2);
      out += resto.length > 4
        ? ' ' + resto.slice(0, -4) + '-' + resto.slice(-4)
        : ' ' + resto;
    }
    return out;
  }

  function mascararAleatoria(v) {
    const s = v.replace(/[^a-zA-Z0-9]/g, '').slice(0, 32);
    return [s.slice(0, 8), s.slice(8, 12), s.slice(12, 16), s.slice(16, 20), s.slice(20, 32)]
      .filter(p => p.length > 0)
      .join('-');
  }

  function mascararChave() {
    const tipo = document.getElementById('sel-tipo').value;
    const input = document.getElementById('inp-chave');
    if (tipo === 'cpf') input.value = mascararCpf(input.value);
    else if (tipo === 'cnpj') input.value = mascararCnpj(input.value);
    else if (tipo === 'telefone') input.value = mascararTelefone(input.value);
    else if (tipo === 'aleatoria') input.value = mascararAleatoria(input.value);
  }

  function toggleSchedule() {
    const checked = document.getElementById('chk-schedule').checked;
    document.getElementById('schedule-row').style.display = checked ? 'flex' : 'none';
  }

  function mostrarTerminal(method, path, status, data) {
    const el = document.getElementById('terminal-output');
    el.style.display = 'block';
    const statusClass = status >= 200 && status < 300 ? 'terminal-status-ok' : 'terminal-status-err';
    el.innerHTML = `
      <div class="terminal-line">
        <span class="terminal-prompt">▶</span>
        <span class="terminal-method">${esc(method)}</span>
        <span class="terminal-path">${esc(path)}</span>
      </div>
      <div class="terminal-line">
        <span class="terminal-prompt">◀</span>
        <span class="${statusClass}">${status}</span>
      </div>
      ${data !== null ? `<div class="terminal-json">${JSON.stringify(data, null, 2)}</div>` : ''}
    `;
  }

  function mostrarCarregando() {
    const el = document.getElementById('terminal-output');
    el.style.display = 'block';
    el.innerHTML = `<div class="terminal-line"><span class="terminal-prompt">▶</span><span class="terminal-cursor"></span></div>`;
  }

  async function carregarHistorico() {
    const { status, data } = await api('GET', '/account/me/withdrawals');
    const hist = document.getElementById('historico');
    if (status !== 200 || !Array.isArray(data) || data.length === 0) {
      hist.innerHTML = '<div class="empty-hist">Nenhum saque registrado.</div>';
      return;
    }
    hist.innerHTML = data.map(s => {
      let statusHtml, meta;
      if (s.error)      { statusHtml = '<span class="saque-status status-erro">✗ ERRO</span>';      meta = s.error_reason || ''; }
      else if (!s.done) { statusHtml = '<span class="saque-status status-agendado">⏳ AGENDADO</span>'; meta = s.scheduled_for || ''; }
      else              { statusHtml = '<span class="saque-status status-ok">✓ CONCLUÍDO</span>';    meta = s.created_at || ''; }
      const pix = s.pix ? `${s.pix.type}: ${s.pix.key}` : '';
      return `
        <div class="saque-row-hist">
          ${statusHtml}
          <div class="saque-info">R$ ${s.amount} → ${esc(pix)}</div>
          <div class="saque-meta">${esc(meta)}</div>
        </div>
      `;
    }).join('');
  }

  async function executarSaque() {
    const valor    = document.getElementById('inp-valor').value.trim();
    const tipo     = document.getElementById('sel-tipo').value;
    const chave    = document.getElementById('inp-chave').value.trim();
    const agendado = document.getElementById('chk-schedule').checked;
    const schedule = agendado ? document.getElementById('inp-schedule').value.trim() : null;

    const body = {
      method: 'PIX',
      amount: parseFloat(valor),
      pix:    { type: tipo, key: chave },
    };
    if (agendado) body.schedule = schedule;

    const path = '/account/me/balance/withdraw';
    mostrarCarregando();

    const { status, data } = await api('POST', path, body);
    mostrarTerminal('POST', path, status, data);

    if (status === 201) {
      const { data: c } = await api('GET', '/account/me');
      if (c) document.getElementById('hdr-saldo').textContent = c.balance;
      await carregarHistorico();
    }
  }

  async function confirmarExcluirConta() {
    if (!confirm('Excluir sua conta? Esta ação não pode ser desfeita.')) return;
    const { status, data } = await api('DELETE', '/account/me');
    if (status === 204) {
      sair();
    } else if (status === 409) {
      mostrarTerminal('DELETE', '/account/me', 409, data);
    } else {
      alert(data?.message || 'Erro ao excluir conta.');
    }
  }

  (async function iniciar() {
    if (token()) {
      await entrarNoPainel();
